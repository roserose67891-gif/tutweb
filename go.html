<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <style>
#list{
    position:relative;
    top: 50px;
}
     </style>
</head>
<body>
   
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="javascript:void(0)">Logo</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mynavbar">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)">Link</a>
        </li>
      </ul>
      <form class="d-flex">
        
        <input class="form-control me-2" type="text" placeholder="Search" id="tet" onkeyup="suggest()">
        <div id="list"></div>
        
        <button class="btn btn-primary" type="button" >Search</button>
        
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid mt-3">
  <h3>Navbar Forms</h3>
  <p>You can also include forms inside the navigation bar.</p>
</div>

   
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function suggest(){
    const items=['bag','watch','baag','watch','money','slipper','house','sweet']
    const input=document.getElementById("tet").value;
const div=document.getElementById("list");

 div.innerHTML="";

        for(let i=0;i < items.length;i++){
            if(items[i].toLowerCase().includes(input.toLowerCase()) && input!=""){
                div.innerHTML+='<a class="jj" href="">'+items[i]+ '</a>';
            }
        }
    }
</script>
</html>
